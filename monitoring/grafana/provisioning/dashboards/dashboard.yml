# 대시보드 자동 프로비저닝: /var/lib/grafana/dashboards 의 JSON을 로드한다.
apiVersion: 1

providers:
  - name: StockPilot
    orgId: 1
    folder: StockPilot
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
