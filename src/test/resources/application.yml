# 테스트 프로파일: H2 인메모리 + Hibernate가 엔티티로 스키마 생성(create-drop).
# users.email 유니크 제약은 User 엔티티의 @UniqueConstraint로 생성되어 동시성 테스트의 근거가 된다.
spring:
  datasource:
    url: jdbc:h2:mem:stockpilot;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

stockpilot:
  jwt:
    secret: test-secret-that-is-at-least-32-bytes-long-000
    access-token-validity-seconds: 3600
  price:
    collector:
      enabled: false   # 테스트 중 스케줄러가 Kafka로 발행하지 않도록 비활성
  like:
    sync:
      enabled: false   # 테스트 중 좋아요 DB 동기화 스케줄러 비활성

# 운영과 동일하게 관측성 엔드포인트를 노출해 메트릭 노출을 테스트에서도 검증한다.
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    tags:
      application: stock-pilot
