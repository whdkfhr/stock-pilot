spring:
  application:
    name: stock-pilot

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stockpilot}
    username: ${DB_USERNAME:stockpilot}
    password: ${DB_PASSWORD:stockpilot}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:stock-pilot}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

stockpilot:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-is-a-32byte-minimum-dev-secret}
    access-token-validity-seconds: ${JWT_ACCESS_TTL:3600}
  kafka:
    stock-price-topic: ${STOCK_PRICE_TOPIC:stock-price}
  price:
    # 시세 소스 선택: random(데모용 랜덤워크, 기본) | yahoo(Yahoo Finance 실시간·약 15분 지연)
    source: ${PRICE_SOURCE:random}
    collector:
      enabled: ${PRICE_COLLECTOR_ENABLED:true}
      interval-ms: ${PRICE_COLLECTOR_INTERVAL_MS:2000}
    yahoo:
      default-suffix: ${YAHOO_DEFAULT_SUFFIX:.KS}   # KOSPI=.KS, KOSDAQ=.KQ
      # 예외 매핑(KOSDAQ 종목 등): symbols[086520]=086520.KQ
      symbols: {}
  like:
    sync:
      enabled: ${LIKE_SYNC_ENABLED:true}
      interval-ms: ${LIKE_SYNC_INTERVAL_MS:10000}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    tags:
      application: stock-pilot
    distribution:
      # p95/p99 지연 관측을 위해 주요 타이머에 히스토그램 버킷을 발행한다.
      percentiles-histogram:
        http.server.requests: true
        stockpilot.recommendation.compute: true

server:
  port: ${SERVER_PORT:8080}
